apiVersion: apps/v2
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: nitinkh92/payment-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
              requests:
                cpu: "100m"
                memory: "128Mi"