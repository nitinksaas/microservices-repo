spring:
  application:
    name: api-gateway

  cloud:
    discovery:
      enabled: false

    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/users/**

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/orders/**

        - id: payment-service
          uri: http://payment-service:8083
          predicates:
            - Path=/payment/**

server:
  port: 8080